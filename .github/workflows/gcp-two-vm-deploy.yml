name: Deploy GCP Two VM

on:
  workflow_dispatch:
  push:
    branches:
      - test/all
    paths:
      - "develop/backend-api/**"
      - "develop/ai-model/v2/**"
      - "develop/deploy/gcp-two-vm/**"
      - ".github/workflows/gcp-two-vm-deploy.yml"

permissions:
  contents: read

concurrency:
  group: gcp-two-vm-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [backend, ai]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write deployment env files
        shell: bash
        run: |
          if [ "${{ matrix.service }}" = "backend" ]; then
            cat > develop/deploy/gcp-two-vm/backend/.env.backend <<'EOF'
            ${{ secrets.GCP_BACKEND_ENV }}
            EOF
          else
            cat > develop/deploy/gcp-two-vm/ai/.env.ai <<'EOF'
            ${{ secrets.GCP_AI_ENV }}
            EOF
          fi

      - name: Build deploy archive
        shell: bash
        run: |
          if [ "${{ matrix.service }}" = "backend" ]; then
            tar \
              --exclude='.git' \
              --exclude='develop/backend-api/node_modules' \
              --exclude='develop/backend-api/logs' \
              --exclude='develop/deploy/gcp-two-vm/ai/.env.ai' \
              -czf .deploy-package.tar.gz \
              develop/backend-api \
              develop/deploy/gcp-two-vm/backend \
              develop/deploy/gcp-two-vm/scripts \
              develop/deploy/gcp-two-vm/README.md \
              develop/deploy/gcp-two-vm/NEXT_STEPS.md
          else
            tar \
              --exclude='.git' \
              --exclude='develop/ai-model/v2/__pycache__' \
              --exclude='develop/ai-model/v2/.ruff_cache' \
              --exclude='develop/ai-model/v2/.pytest_cache' \
              --exclude='develop/ai-model/v2/data' \
              --exclude='develop/ai-model/v2/v2-deploy.tar.gz' \
              --exclude='develop/ai-model/v2/simulation_*.json' \
              --exclude='develop/ai-model/v2/simulation_output.txt' \
              --exclude='develop/ai-model/v2/ruff_result.txt' \
              --exclude='develop/deploy/gcp-two-vm/backend/.env.backend' \
              -czf .deploy-package.tar.gz \
              develop/ai-model/v2 \
              develop/deploy/gcp-two-vm/ai \
              develop/deploy/gcp-two-vm/scripts \
              develop/deploy/gcp-two-vm/README.md \
              develop/deploy/gcp-two-vm/NEXT_STEPS.md
          fi

      - name: Configure SSH
        shell: bash
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.GCP_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.GCP_BACKEND_HOST }}" >> ~/.ssh/known_hosts
          ssh-keyscan -H "${{ secrets.GCP_AI_HOST }}" >> ~/.ssh/known_hosts

      - name: Select target host
        shell: bash
        run: |
          if [ "${{ matrix.service }}" = "backend" ]; then
            echo "DEPLOY_HOST=${{ secrets.GCP_BACKEND_HOST }}" >> "$GITHUB_ENV"
          else
            echo "DEPLOY_HOST=${{ secrets.GCP_AI_HOST }}" >> "$GITHUB_ENV"
          fi

      - name: Upload archive
        shell: bash
        run: |
          scp .deploy-package.tar.gz "kimseoungho0219@${DEPLOY_HOST}:/tmp/healthmate-deploy.tar.gz"

      - name: Normalize deploy script
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          src = Path("develop/deploy/gcp-two-vm/scripts/bootstrap_and_deploy.sh")
          dst = Path(".bootstrap_and_deploy.clean.sh")

          content = src.read_text(encoding="utf-8-sig")
          content = content.replace("\r\n", "\n").replace("\r", "\n")
          dst.write_text(content, encoding="utf-8", newline="\n")
          PY
          chmod +x .bootstrap_and_deploy.clean.sh

      - name: Bootstrap and deploy
        shell: bash
        run: |
          ssh "kimseoungho0219@${DEPLOY_HOST}" "bash -s -- ${{ matrix.service }} /tmp/healthmate-deploy.tar.gz" < .bootstrap_and_deploy.clean.sh
