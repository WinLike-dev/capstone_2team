name: Deploy GCP Two VM

on:
  workflow_dispatch:
  push:
    branches:
      - test/all
    paths:
      - "develop/backend-api/**"
      - "develop/ai-model/v2/**"
      - "develop/deploy/gcp-two-vm/**"
      - ".github/workflows/gcp-two-vm-deploy.yml"

permissions:
  contents: read

concurrency:
  group: gcp-two-vm-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [backend, ai]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write deployment env files
        shell: bash
        run: |
          cat > develop/deploy/gcp-two-vm/backend/.env.backend <<'EOF'
          ${{ secrets.GCP_BACKEND_ENV }}
          EOF

          cat > develop/deploy/gcp-two-vm/ai/.env.ai <<'EOF'
          ${{ secrets.GCP_AI_ENV }}
          EOF

      - name: Build deploy archive
        shell: bash
        run: |
          tar \
            --exclude='.git' \
            --exclude='develop/backend-api/node_modules' \
            --exclude='develop/backend-api/logs' \
            --exclude='develop/ai-model/v2/__pycache__' \
            --exclude='develop/ai-model/v2/.ruff_cache' \
            --exclude='develop/ai-model/v2/.pytest_cache' \
            --exclude='develop/ai-model/v2/data' \
            --exclude='develop/ai-model/v2/v2-deploy.tar.gz' \
            --exclude='develop/ai-model/v2/simulation_*.json' \
            --exclude='develop/ai-model/v2/simulation_output.txt' \
            --exclude='develop/ai-model/v2/ruff_result.txt' \
            -czf .deploy-package.tar.gz \
            develop/backend-api \
            develop/ai-model/v2 \
            develop/deploy/gcp-two-vm

      - name: Configure SSH
        shell: bash
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.GCP_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.GCP_BACKEND_HOST }}" >> ~/.ssh/known_hosts
          ssh-keyscan -H "${{ secrets.GCP_AI_HOST }}" >> ~/.ssh/known_hosts

      - name: Select target host
        shell: bash
        run: |
          if [ "${{ matrix.service }}" = "backend" ]; then
            echo "DEPLOY_HOST=${{ secrets.GCP_BACKEND_HOST }}" >> "$GITHUB_ENV"
          else
            echo "DEPLOY_HOST=${{ secrets.GCP_AI_HOST }}" >> "$GITHUB_ENV"
          fi

      - name: Upload archive
        shell: bash
        run: |
          scp .deploy-package.tar.gz "kimseoungho0219@${DEPLOY_HOST}:/tmp/healthmate-deploy.tar.gz"

      - name: Bootstrap and deploy
        shell: bash
        run: |
          ssh "kimseoungho0219@${DEPLOY_HOST}" "bash -s -- ${{ matrix.service }} /tmp/healthmate-deploy.tar.gz" < develop/deploy/gcp-two-vm/scripts/bootstrap_and_deploy.sh
