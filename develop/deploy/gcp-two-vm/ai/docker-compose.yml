services:
  ai-hub-v2:
    build:
      context: ../../../ai-model/v2
      dockerfile: Dockerfile
    image: capstone-ai-hub-v2:latest
    container_name: ai-hub-v2
    env_file:
      - ./.env.ai
    environment:
      APP_ENV: production
      LOG_LEVEL: INFO
      CHECKPOINT_DB_PATH: /app/data/checkpoints.sqlite
    ports:
      - "8000:8000"
    volumes:
      - ../../../ai-model/v2/data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
